format = """
$directory\
$git_branch\
$git_status\
$line_break\
$character
"""

[directory]
style             = "bright-white"
truncation_length = 1
format            = '[$path]($style)'

[git_branch]
style  = "bright-black"
format = ' [$branch]($style)'

[git_status]
untracked  = "‚Äč"
modified   = "‚Äč"
staged     = "‚Äč"
renamed    = "‚Äč"
deleted    = "‚Äč"
stashed    = "‚Č°"
format     = "[[(*$untracked$modified$staged$renamed$deleted)](bright-black) ($ahead_behind$stashed)](bright-white)"

[character]
success_symbol = "[>](bright-purple)"
error_symbol   = "[>](bright-red)"
